# ARCHI §8 — 5 blocking gates on the Linux host. No Android build in CI:
# the APK is built locally, where the keystore lives.
# Third-party actions are SHA-pinned and gate tools version-pinned
# (CLAUDE.md §Sécurité supply chain); bump SHAs and versions together.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # wry/webkit2gtk-sys need these to compile the host-side dioxus build
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 2026-06-06
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov@0.8.5,cargo-audit@0.22.0,cargo-deny@0.19.4

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --locked

      # Gate scoped to domain/ (CLAUDE.md §Couverture) — ui/platform/main/tests excluded.
      # ponytail: llvm-cov exits 1 on 0/0 lines, so skip while domain/ is an empty stub;
      # the gate arms itself with the first domain function (task 03).
      - name: Coverage (domain ≥ 85%)
        run: |
          if grep -rqE '^\s*(pub(\([^)]*\))?\s+)?(async\s+|const\s+|unsafe\s+)*fn\s' src/domain/; then
            cargo llvm-cov --locked --fail-under-lines 85 \
              --ignore-filename-regex 'src/(ui|platform)/|src/main\.rs|tests/'
          else
            echo "src/domain/ has no code yet — coverage gate arms with task 03"
          fi

      - name: Audit (RustSec advisories)
        run: cargo audit

      - name: Deny (licenses, advisories, bans, sources)
        run: cargo deny check
